<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia - Assignments & Mid-sems</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="top-bar">
        <button class="mobile-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
        <h1>Assignments & Mid-sems</h1>
        <div class="top-bar-actions">
          <button class="btn btn-primary btn-sm" id="create-assignment-btn" style="display:none" onclick="showModal('assignment-modal')">+ New Assignment</button>
          <button class="btn btn-accent btn-sm" id="create-midsem-btn" style="display:none" onclick="showModal('midsem-modal')">+ New Mid-sem</button>
        </div>
      </div>
      <div class="content-area">
        <div class="level-tabs">
          <div class="level-tab active" onclick="showTab('assignments')">Assignments</div>
          <div class="level-tab" onclick="showTab('midsems')">Mid-sem Exams</div>
        </div>

        <div id="assignments-tab">
          <div class="card">
            <div class="card-body">
              <div class="table-wrapper">
                <table id="assignments-table">
                  <thead>
                    <tr>
                      <th>Course</th>
                      <th>Assignment</th>
                      <th>Due Date</th>
                      <th>Status</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody id="assignments-body"></tbody>
                </table>
              </div>
              <div id="no-assignments" class="empty-state" style="display:none"><div class="icon"><i data-lucide="file-text"></i></div><h3>No Assignments</h3><p>No assignments available yet.</p></div>
            </div>
          </div>
        </div>

        <div id="midsems-tab" style="display:none">
          <div class="card">
            <div class="card-body">
              <div class="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th>Course</th>
                      <th>Exam Title</th>
                      <th>Date</th>
                      <th>Venue</th>
                      <th>Marks</th>
                    </tr>
                  </thead>
                  <tbody id="midsems-body"></tbody>
                </table>
              </div>
              <div id="no-midsems" class="empty-state" style="display:none"><div class="icon"><i data-lucide="clipboard-list"></i></div><h3>No Mid-sem Exams</h3><p>No exams scheduled.</p></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Create Assignment Modal -->
  <div class="modal-overlay" id="assignment-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Create Assignment</h2>
        <button class="modal-close" onclick="hideModal('assignment-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form onsubmit="createAssignment(event)">
          <div class="form-group"><label>Course</label><select id="as-course" required></select></div>
          <div class="form-group"><label>Title</label><input type="text" id="as-title" required></div>
          <div class="form-group"><label>Description</label><textarea id="as-desc" rows="3"></textarea></div>
          <div class="form-row">
            <div class="form-group"><label>Due Date</label><input type="datetime-local" id="as-due" required></div>
            <div class="form-group"><label>Total Marks</label><input type="number" id="as-marks" value="100"></div>
          </div>
          <div class="form-group"><label>Attachment</label><input type="file" id="as-file"></div>
          <button type="submit" class="btn btn-primary btn-block">Create Assignment</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Create Mid-sem Modal -->
  <div class="modal-overlay" id="midsem-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Schedule Mid-sem Exam</h2>
        <button class="modal-close" onclick="hideModal('midsem-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form onsubmit="createMidsem(event)">
          <div class="form-group"><label>Course</label><select id="ms-course" required></select></div>
          <div class="form-group"><label>Exam Title</label><input type="text" id="ms-title" required></div>
          <div class="form-group"><label>Description</label><textarea id="ms-desc" rows="2"></textarea></div>
          <div class="form-row">
            <div class="form-group"><label>Date & Time</label><input type="datetime-local" id="ms-date" required></div>
            <div class="form-group"><label>Duration (min)</label><input type="number" id="ms-duration" value="60"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Total Marks</label><input type="number" id="ms-marks" value="50"></div>
            <div class="form-group"><label>Venue</label><input type="text" id="ms-venue" placeholder="Hall A"></div>
          </div>
          <div class="form-group"><label>Instructions</label><textarea id="ms-instructions" rows="2"></textarea></div>
          <button type="submit" class="btn btn-primary btn-block">Schedule Exam</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Submit Assignment Modal -->
  <div class="modal-overlay" id="submit-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Submit Assignment</h2>
        <button class="modal-close" onclick="hideModal('submit-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form onsubmit="submitAssignment(event)">
          <input type="hidden" id="submit-assignment-id">
          <div class="form-group"><label>Notes (optional)</label><textarea id="submit-notes" rows="3"></textarea></div>
          <div class="form-group"><label>Upload File</label><input type="file" id="submit-file"></div>
          <button type="submit" class="btn btn-primary btn-block">Submit</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (checkAuth()) {
      const user = getUser();
      renderSidebar('assignments');
      if (user.role === 'lecturer' || user.role === 'admin') {
        document.getElementById('create-assignment-btn').style.display = 'inline-flex';
        document.getElementById('create-midsem-btn').style.display = 'inline-flex';
      }
      loadAssignments();
      loadMidsems();
      loadCoursesForSelects();
    }

    function showTab(tab) {
      document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('assignments-tab').style.display = tab === 'assignments' ? 'block' : 'none';
      document.getElementById('midsems-tab').style.display = tab === 'midsems' ? 'block' : 'none';
    }

    async function loadCoursesForSelects() {
      const courses = await apiGet('/api/courses');
      if (!courses) return;
      const options = courses.map(c => `<option value="${c.id}">${c.code} - ${c.title}</option>`).join('');
      document.getElementById('as-course').innerHTML = options;
      document.getElementById('ms-course').innerHTML = options;
    }

    async function loadAssignments() {
      const data = await apiGet('/api/assignments');
      if (!data) return;
      const user = getUser();

      if (data.length === 0) {
        document.getElementById('assignments-table').style.display = 'none';
        document.getElementById('no-assignments').style.display = 'block';
        return;
      }

        document.getElementById('assignments-body').innerHTML = data.map(a => {
        const isOverdue = new Date(a.due_date) < new Date();
        let statusHtml = '';
        let actionHtml = '';

        if (user.role === 'student') {
          if (a.submitted) {
            statusHtml = `<span class="badge badge-success">Submitted</span>`;
            actionHtml = a.my_grade !== null ? `<span class="badge badge-primary">Grade: ${a.my_grade}/${a.total_marks}</span>` : '<span class="badge badge-warning">Graded pending</span>';
          } else if (isOverdue) {
            statusHtml = '<span class="badge badge-danger">Overdue</span>';
          } else {
            statusHtml = '<span class="badge badge-warning">Pending</span>';
            actionHtml = `<button class="btn btn-primary btn-sm" onclick="openSubmit(${a.id})">Submit</button>`;
          }
        } else {
          statusHtml = `<span class="badge badge-info">${a.submission_count || 0} submissions</span>`;
          actionHtml = `<span class="badge badge-purple">${a.graded_count || 0} graded</span>`;
        }

        return `
          <tr>
            <td><strong>${a.course_code}</strong><br><small style="color:var(--text-secondary)">${a.course_title}</small></td>
            <td>${a.title}</td>
            <td>${formatDateTime(a.due_date)}${isOverdue ? '<br><small style="color:var(--danger)">Overdue</small>' : ''}</td>
            <td>${statusHtml}</td>
            <td>${actionHtml}</td>
          </tr>
        `;
      }).join('');
      lucide.createIcons();
    }

    async function loadMidsems() {
      const data = await apiGet('/api/assignments/midsems');
      if (!data) return;

      if (data.length === 0) {
        document.querySelector('#midsems-tab table').style.display = 'none';
        document.getElementById('no-midsems').style.display = 'block';
        return;
      }

      document.getElementById('midsems-body').innerHTML = data.map(m => `
        <tr>
          <td><strong>${m.course_code}</strong><br><small>${m.course_title}</small></td>
          <td>${m.title}</td>
          <td>${formatDateTime(m.exam_date)}<br><small>${m.duration_minutes} mins</small></td>
          <td>${m.venue || 'TBA'}</td>
          <td>${m.total_marks}</td>
        </tr>
      `).join('');
      lucide.createIcons();
    }

    function openSubmit(assignmentId) {
      document.getElementById('submit-assignment-id').value = assignmentId;
      showModal('submit-modal');
    }

    async function submitAssignment(e) {
      e.preventDefault();
      const formData = new FormData();
      const notes = document.getElementById('submit-notes').value;
      if (notes) formData.append('notes', notes);
      const file = document.getElementById('submit-file').files[0];
      if (file) formData.append('file', file);

      const res = await apiPostForm(`/api/assignments/submit/${document.getElementById('submit-assignment-id').value}`, formData);
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast('Assignment submitted!', 'success');
      hideModal('submit-modal');
      loadAssignments();
    }

    async function createAssignment(e) {
      e.preventDefault();
      const formData = new FormData();
      formData.append('course_id', document.getElementById('as-course').value);
      formData.append('title', document.getElementById('as-title').value);
      formData.append('description', document.getElementById('as-desc').value);
      formData.append('due_date', document.getElementById('as-due').value);
      formData.append('total_marks', document.getElementById('as-marks').value);
      const file = document.getElementById('as-file').files[0];
      if (file) formData.append('attachment', file);

      const res = await apiPostForm('/api/assignments', formData);
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast('Assignment created!', 'success');
      hideModal('assignment-modal');
      loadAssignments();
    }

    async function createMidsem(e) {
      e.preventDefault();
      const res = await apiPost('/api/assignments/midsem', {
        course_id: document.getElementById('ms-course').value,
        title: document.getElementById('ms-title').value,
        description: document.getElementById('ms-desc').value,
        exam_date: document.getElementById('ms-date').value,
        duration_minutes: document.getElementById('ms-duration').value,
        total_marks: document.getElementById('ms-marks').value,
        venue: document.getElementById('ms-venue').value,
        instructions: document.getElementById('ms-instructions').value,
      });
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast('Mid-sem exam scheduled!', 'success');
      hideModal('midsem-modal');
      loadMidsems();
    }

    function showModal(id) { document.getElementById(id).classList.add('active'); }
    function hideModal(id) { document.getElementById(id).classList.remove('active'); }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academia - Forgot Password</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d1642 0%, #1a237e 50%, #3949ab 100%);
      padding: 20px;
    }
    .forgot-shell { width: 100%; max-width: 460px; background: rgba(255,255,255,0.96); border-radius: 18px; overflow: hidden; box-shadow: 0 18px 55px rgba(0,0,0,0.18); }
    .forgot-head { background: var(--primary); color: white; padding: 24px; text-align: center; }
    .forgot-body { padding: 24px; }
    .field { margin-bottom: 16px; }
    label { display: block; margin-bottom: 8px; font-weight: 700; }
    input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; }
    .action { width: 100%; }
  </style>
</head>
<body>
  <div class="forgot-shell">
    <div class="forgot-head">
      <div style="font-size:2rem;font-weight:900;letter-spacing:2px">ACADEMIA</div>
      <div style="opacity:0.85;margin-top:4px">Forgot your password?</div>
    </div>
    <div class="forgot-body">
      <div id="forgot-message" class="success-msg" style="display:none"></div>
      <div id="forgot-error" class="error-msg" style="display:none"></div>
      <form id="forgot-form">
        <div class="field">
          <label for="forgotEmail">Registered Email</label>
          <input id="forgotEmail" type="email" placeholder="Enter the email used to create your account" required onblur="autocorrectGmail(this)" />
        </div>
        <button class="btn btn-primary action" type="submit">Send Reset Link</button>
      </form>
    </div>
  </div>

  <script>
    lucide.createIcons();

    function autocorrectGmail(input) {
      let val = input.value.trim();
      if (!val || val.includes('@')) return;
      input.value = val + '@gmail.com';
    }

    const forgotForm = document.getElementById('forgot-form');
    const forgotMessage = document.getElementById('forgot-message');
    const forgotError = document.getElementById('forgot-error');

    function showMessage(type, text) {
      const el = type === 'success' ? forgotMessage : forgotError;
      el.textContent = text;
      el.style.display = 'block';
      const hidden = type === 'success' ? forgotError : forgotMessage;
      hidden.style.display = 'none';
    }

    forgotForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('forgotEmail').value.trim();
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (!res.ok) {
        showMessage('error', data.error || 'Unable to send reset link.');
        return;
      }
      showMessage('success', data.message || 'Reset link sent.');
      forgotForm.reset();
    });
  </script>
</body>
</html>

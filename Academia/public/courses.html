<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia - Courses</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="top-bar">
        <button class="mobile-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
        <h1>Courses</h1>
        <div class="top-bar-actions">
          <button class="btn btn-primary btn-sm" id="add-course-btn" style="display:none" onclick="showModal('course-modal')">+ Add Course</button>
          <button class="btn btn-accent btn-sm" id="upload-material-btn" style="display:none" onclick="showModal('material-modal')">+ Upload Material</button>
        </div>
      </div>
      <div class="content-area">
        <div class="level-tabs" id="level-tabs">
          <div class="level-tab active" onclick="filterLevel('')">All Levels</div>
          <div class="level-tab" onclick="filterLevel('L100')">L100</div>
          <div class="level-tab" onclick="filterLevel('L200')">L200</div>
          <div class="level-tab" onclick="filterLevel('L300')">L300</div>
          <div class="level-tab" onclick="filterLevel('L400')">L400</div>
        </div>

        <div class="filter-bar">
          <select id="semester-filter" onchange="loadCourses()">
            <option value="">All Semesters</option>
            <option value="first">First Semester</option>
            <option value="second">Second Semester</option>
          </select>
          <input type="text" id="search-courses" placeholder="Search courses..." oninput="loadCourses()" style="flex:1;min-width:200px">
        </div>

        <div class="course-grid" id="course-list"></div>

        <!-- Materials Panel -->
        <div class="card" id="materials-panel" style="display:none;margin-top:24px">
          <div class="card-header">
            <h2 id="materials-title">Course Materials</h2>
            <button class="btn btn-outline btn-sm" onclick="document.getElementById('materials-panel').style.display='none'">Close</button>
          </div>
          <div class="card-body">
            <ul class="material-list" id="materials-list"></ul>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Course Modal (Lecturers create drafts) -->
  <div class="modal-overlay" id="course-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Create Course</h2>
        <button class="modal-close" onclick="hideModal('course-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px">Your course will be submitted as a draft for admin approval.</p>
        <form onsubmit="createCourse(event)">
          <div class="form-row">
            <div class="form-group"><label>Course Code</label><input type="text" id="cr-code" placeholder="e.g. CSC101" required></div>
            <div class="form-group"><label>Level</label><select id="cr-level"><option value="L100">L100</option><option value="L200">L200</option><option value="L300">L300</option><option value="L400">L400</option></select></div>
          </div>
          <div class="form-group"><label>Course Title</label><input type="text" id="cr-title" placeholder="Introduction to Computer Science" required></div>
          <div class="form-group"><label>Description</label><textarea id="cr-desc" rows="2" placeholder="Brief description..."></textarea></div>
          <div class="form-row">
            <div class="form-group"><label>School</label><select id="cr-school" required>
              <option>University for Development Studies</option>
              <option>University of Education, Winneba</option>
              <option>Ghana Institute of Management and Public Administration</option>
              <option>University of Mines and Technology</option>
              <option>University of Health and Allied Sciences</option>
              <option>University of Energy and Natural Resources</option>
            </select></div>
            <div class="form-group"><label>Semester</label><select id="cr-semester"><option value="first">First</option><option value="second">Second</option></select></div>
          </div>
          <div class="form-group"><label>Department</label><input type="text" id="cr-dept" placeholder="e.g. Computer Science"></div>
          <button type="submit" class="btn btn-primary btn-block">Submit Course</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Upload Material Modal -->
  <div class="modal-overlay" id="material-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Upload Material</h2>
        <button class="modal-close" onclick="hideModal('material-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <form onsubmit="uploadMaterial(event)">
          <div class="form-group">
            <label>Course</label>
            <select id="mat-course" required></select>
          </div>
          <div class="form-group"><label>Title</label><input type="text" id="mat-title" required></div>
          <div class="form-group"><label>Description</label><textarea id="mat-desc" rows="2"></textarea></div>
          <div class="form-row">
            <div class="form-group">
              <label>Category</label>
              <select id="mat-category">
                <option value="lecture_note">Lecture Note</option>
                <option value="textbook">Textbook</option>
                <option value="slide">Slides</option>
                <option value="past_question">Past Question</option>
                <option value="video">Video</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group"><label>Academic Year</label><input type="text" id="mat-year" placeholder="2025/2026"></div>
          </div>
          <div class="form-group"><label>File</label><input type="file" id="mat-file"></div>
          <button type="submit" class="btn btn-primary btn-block">Upload</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let currentLevel = '';
    let allCourses = [];

    if (checkAuth()) {
      const user = getUser();
      renderSidebar('courses');

      if (user.role === 'student' && user.level) {
        currentLevel = user.level;
        document.querySelectorAll('.level-tab').forEach(t => {
          t.classList.remove('active');
          if (t.textContent.trim() === user.level) t.classList.add('active');
        });
      }

      if (user.role === 'lecturer' || user.role === 'admin') {
        document.getElementById('add-course-btn').style.display = 'inline-flex';
        document.getElementById('upload-material-btn').style.display = 'inline-flex';
      }
      loadCourses();
    }

    async function loadCourses() {
      const semester = document.getElementById('semester-filter').value;
      const search = document.getElementById('search-courses').value;
      let url = `/api/courses?level=${currentLevel}&semester=${semester}&search=${encodeURIComponent(search)}`;
      const courses = await apiGet(url);
      if (!courses) return;
      allCourses = courses;
      renderCourses(courses);
    }

    function filterLevel(level) {
      currentLevel = level;
      document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      loadCourses();
    }

    function renderCourses(courses) {
      const user = getUser();
      if (courses.length === 0) {
        document.getElementById('course-list').innerHTML = '<div class="empty-state"><div class="icon"><i data-lucide="book-open"></i></div><h3>No Courses Found</h3><p>No courses match your criteria.</p></div>';
        lucide.createIcons();
        return;
      }

      document.getElementById('course-list').innerHTML = courses.map(c => {
        const isEnrolled = c.enrolled;
        let actionBtns = '';
        if (user.role === 'student') {
          actionBtns = isEnrolled
            ? `<button class="btn btn-danger btn-sm" onclick="unenrollCourse(${c.id})">Unenroll</button>`
            : `<button class="btn btn-success btn-sm" onclick="enrollCourse(${c.id})">Enroll</button>`;
        } else if (user.role === 'lecturer' || user.role === 'admin') {
          // lecturers/admins only see their own courses, no enroll needed
        }
        return `
          <div class="course-card">
            <div class="course-code">${c.code}</div>
            <h3>${c.title}</h3>
            <div class="course-meta">
              <span class="badge badge-primary">${c.level}</span>
              <span class="badge badge-${c.semester==='first'?'success':'purple'}">${c.semester} semester</span>
              <span style="margin-left:8px;font-size:0.85rem">${c.lecturer_name || 'TBA'}</span>
              ${user.role === 'student' && isEnrolled ? '<span class="badge badge-success" style="margin-left:4px">Enrolled</span>' : ''}
            </div>
            <div class="course-actions">
              <button class="btn btn-primary btn-sm" onclick="viewMaterials(${c.id}, '${c.code} - ${c.title.replace(/'/g,"\\'")}')">Materials</button>
              ${actionBtns}
            </div>
          </div>
        `;
      }).join('');

      const matSelect = document.getElementById('mat-course');
      if (matSelect) {
        matSelect.innerHTML = courses.map(c => `<option value="${c.id}">${c.code} - ${c.title}</option>`).join('');
      }
    }

    async function viewMaterials(courseId, courseName) {
      document.getElementById('materials-title').textContent = 'Materials: ' + courseName;
      document.getElementById('materials-panel').style.display = 'block';
      const materials = await apiGet(`/api/courses/${courseId}/materials`);
      if (!materials || materials.length === 0) {
        document.getElementById('materials-list').innerHTML = '<div class="empty-state"><div class="icon"><i data-lucide="file"></i></div><p>No materials uploaded yet</p></div>';
        lucide.createIcons();
        return;
      }
      document.getElementById('materials-list').innerHTML = materials.map(m => {
        const ext = m.file_path ? m.file_path.split('.').pop().toLowerCase() : '';
        const iconClass = ['pdf'].includes(ext) ? 'pdf' : ['doc','docx','txt'].includes(ext) ? 'doc' : ['mp4','avi','mov'].includes(ext) ? 'vid' : 'other';
        const icons = { pdf: '<i data-lucide="file"></i>', doc: '<i data-lucide="file-text"></i>', vid: '<i data-lucide="video"></i>', other: '<i data-lucide="folder"></i>' };
        return `
          <li class="material-item">
            <div class="material-icon ${iconClass}">${icons[iconClass] || icons.other}</div>
            <div class="material-info">
              <h4>${m.title}</h4>
              <p>${m.category ? m.category.replace(/_/g,' ') : ''} ${m.academic_year ? '&middot; ' + m.academic_year : ''} &middot; ${m.uploaded_by_name}</p>
            </div>
            ${m.file_path ? `<a href="${m.file_path}" target="_blank" class="btn btn-outline btn-sm">Download</a>` : ''}
          </li>
        `;
      }).join('');
      lucide.createIcons();
    }

    async function enrollCourse(courseId) {
      const res = await apiPost('/api/courses/enroll', { course_id: courseId });
      showToast(res.message || res.error, res.error ? 'error' : 'success');
      if (!res.error) loadCourses();
    }

    async function unenrollCourse(courseId) {
      if (!confirm('Are you sure you want to unenroll from this course?')) return;
      const res = await apiPost('/api/courses/unenroll', { course_id: courseId });
      showToast(res.message || res.error, res.error ? 'error' : 'success');
      if (!res.error) loadCourses();
    }

    async function createCourse(e) {
      e.preventDefault();
      const res = await apiPost('/api/admin/courses', {
        code: document.getElementById('cr-code').value,
        title: document.getElementById('cr-title').value,
        description: document.getElementById('cr-desc').value,
        level: document.getElementById('cr-level').value,
        school: document.getElementById('cr-school').value,
        department: document.getElementById('cr-dept').value,
        semester: document.getElementById('cr-semester').value,
      });
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast(res.message || 'Course created!', 'success');
      hideModal('course-modal');
      loadCourses();
    }

    async function uploadMaterial(e) {
      e.preventDefault();
      const formData = new FormData();
      formData.append('course_id', document.getElementById('mat-course').value);
      formData.append('title', document.getElementById('mat-title').value);
      formData.append('description', document.getElementById('mat-desc').value);
      formData.append('category', document.getElementById('mat-category').value);
      formData.append('academic_year', document.getElementById('mat-year').value);
      const file = document.getElementById('mat-file').files[0];
      if (file) formData.append('file', file);

      const res = await apiPostForm('/api/courses', formData);
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast('Material uploaded!', 'success');
      hideModal('material-modal');
    }

    function showModal(id) { document.getElementById(id).classList.add('active'); }
    function hideModal(id) { document.getElementById(id).classList.remove('active'); }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia - Calendar</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <div class="top-bar">
        <button class="mobile-toggle" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
        <h1>Calendar</h1>
        <div class="top-bar-actions">
          <button class="btn btn-primary btn-sm" id="add-event-btn" style="display:none" onclick="showModal('event-modal')">+ Add Event</button>
        </div>
      </div>
      <div class="content-area">
        <div class="card">
          <div class="card-header">
            <div class="calendar-nav">
              <button class="btn btn-outline btn-sm" onclick="changeMonth(-1)">&#9664;</button>
              <h3 id="cal-month-year"></h3>
              <button class="btn btn-outline btn-sm" onclick="changeMonth(1)">&#9654;</button>
            </div>
            <button class="btn btn-outline btn-sm" onclick="goToday()">Today</button>
          </div>
          <div class="card-body">
            <div class="calendar-grid" id="calendar-grid"></div>
          </div>
        </div>

        <div class="card" style="margin-top:20px">
          <div class="card-header"><h2>Upcoming Events</h2></div>
          <div class="card-body" id="events-list"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add Event Modal -->
  <div class="modal-overlay" id="event-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Add Calendar Event</h2>
        <button class="modal-close" onclick="hideModal('event-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <p id="event-submit-hint" style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px;display:none">Your event will be reviewed by an administrator before being published.</p>
        <form onsubmit="createEvent(event)">
          <div class="form-group"><label>Title</label><input type="text" id="ev-title" required></div>
          <div class="form-group"><label>Description</label><textarea id="ev-desc" rows="2"></textarea></div>
          <div class="form-row">
            <div class="form-group"><label>Start Date</label><input type="datetime-local" id="ev-start" required></div>
            <div class="form-group"><label>End Date</label><input type="datetime-local" id="ev-end"></div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Type</label>
              <select id="ev-type">
                <option value="lecture">Lecture</option>
                <option value="exam">Exam</option>
                <option value="assignment">Assignment</option>
                <option value="deadline">Deadline</option>
                <option value="event">Event</option>
                <option value="holiday">Holiday</option>
              </select>
            </div>
            <div class="form-group"><label>School</label><input type="text" id="ev-school" placeholder="Leave blank for all"></div>
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="event-submit-btn">Add Event</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    let currentDate = new Date();
    let currentUserRole = '';

    if (checkAuth()) {
      const user = getUser();
      currentUserRole = user.role;
      renderSidebar('calendar');
      if (user.role === 'lecturer' || user.role === 'admin') {
        document.getElementById('add-event-btn').style.display = 'inline-flex';
      }
      if (user.role === 'lecturer') {
        document.getElementById('event-submit-hint').style.display = 'block';
        document.getElementById('event-submit-btn').textContent = 'Submit Event';
      }
      renderCalendar();
    }

    function changeMonth(delta) {
      currentDate.setMonth(currentDate.getMonth() + delta);
      renderCalendar();
    }

    function goToday() {
      currentDate = new Date();
      renderCalendar();
    }

    async function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      document.getElementById('cal-month-year').textContent = new Date(year, month).toLocaleDateString('en-US', { year: 'numeric', month: 'long' });

      const events = await apiGet(`/api/calendar?year=${year}&month=${month + 1}`);
      if (!events) return;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      let html = dayNames.map(d => `<div class="cal-header">${d}</div>`).join('');

      for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
        const dayEvents = events.filter(e => e.event_date && e.event_date.startsWith(dateStr));

        html += `
          <div class="cal-day ${isToday ? 'today' : ''}">
            <div class="day-num">${d}</div>
            ${dayEvents.map(e => `<div class="cal-event ${e.event_type}" title="${e.title}">${e.title}</div>`).join('')}
          </div>
        `;
      }

      document.getElementById('calendar-grid').innerHTML = html;

      const upcoming = events.filter(e => new Date(e.event_date) >= today).slice(0, 10);
      document.getElementById('events-list').innerHTML = upcoming.length === 0
        ? '<div class="empty-state"><div class="icon"><i data-lucide="calendar"></i></div><p>No upcoming events</p></div>'
        : upcoming.map(e => `
          <div style="display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)">
            <div class="stat-icon ${e.event_type==='exam'?'red':e.event_type==='assignment'?'orange':'blue'}" style="width:44px;height:44px;border-radius:10px;font-size:1.2rem;flex-shrink:0">
              ${e.event_type==='exam'?'<i data-lucide="clipboard-list"></i>':e.event_type==='assignment'?'<i data-lucide="file-text"></i>':e.event_type==='holiday'?'&#127876;':'<i data-lucide="calendar"></i>'}
            </div>
            <div style="flex:1">
              <h4 style="font-size:0.95rem">${e.title}</h4>
              <p style="font-size:0.82rem;color:var(--text-secondary)">${formatDateTime(e.event_date)} ${e.course_code ? '&middot; ' + e.course_code : ''}</p>
            </div>
            <span class="badge badge-${e.event_type==='exam'?'danger':e.event_type==='assignment'?'warning':'primary'}">${e.event_type}</span>
            ${currentUserRole === 'lecturer' && e.status ? `<span class="badge badge-${e.status==='approved'?'success':e.status==='rejected'?'danger':'warning'}">${e.status}</span>` : ''}
          </div>
        `).join('');
      lucide.createIcons();
    }

    async function createEvent(e) {
      e.preventDefault();
      const res = await apiPost('/api/calendar', {
        title: document.getElementById('ev-title').value,
        description: document.getElementById('ev-desc').value,
        event_date: document.getElementById('ev-start').value,
        end_date: document.getElementById('ev-end').value || null,
        event_type: document.getElementById('ev-type').value,
        school: document.getElementById('ev-school').value || null,
      });
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast(res.message || 'Event added!', 'success');
      hideModal('event-modal');
      renderCalendar();
    }

    function showModal(id) { document.getElementById(id).classList.add('active'); }
    function hideModal(id) { document.getElementById(id).classList.remove('active'); }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body>
</html>

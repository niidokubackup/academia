<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia - Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8eaf6 0%, #f5f5f5 40%, #e3f2fd 100%);
      overflow-y: auto;
      position: relative;
      padding: 20px 0;
    }
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); animation: orbFloat 20s ease-in-out infinite; }
    .orb-1 { width: 400px; height: 400px; background: rgba(59,130,246,0.08); top: -10%; left: -5%; }
    .orb-2 { width: 350px; height: 350px; background: rgba(139,92,246,0.08); bottom: -10%; right: -5%; animation-delay: -7s; }
    .orb-3 { width: 250px; height: 250px; background: rgba(249,115,22,0.06); top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -14s; }
    @keyframes orbFloat { 0%,100%{transform:translate(0,0)scale(1)} 25%{transform:translate(30px,-40px)scale(1.05)} 50%{transform:translate(-20px,20px)scale(0.95)} 75%{transform:translate(40px,30px)scale(1.02)} }
    .login-wrapper { width: 100%; max-width: 460px; position: relative; z-index: 1; padding: 20px; animation: wrapperIn .8s forwards; }
    @keyframes wrapperIn { from { opacity: 0; transform: translateY(30px) scale(.96);} to { opacity: 1; transform: translateY(0) scale(1);} }
    .brand { text-align: center; margin-bottom: 28px; }
    .brand-logos { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 20px; }
    .brand-logos img { height: 56px; filter: drop-shadow(0 4px 20px rgba(59,130,246,.2)); }
    .brand-logos img.logo-main { height: 68px; }
    .brand h1 { font-size: 1.1rem; font-weight: 600; color: #1a237e; letter-spacing: 4px; text-transform: uppercase; }
    .login-card { background: rgba(255,255,255,.72); backdrop-filter: blur(24px); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,.6); box-shadow: 0 20px 60px rgba(0,0,0,.06); }
    .card-body { padding: 26px 24px 14px; }
    .portal-badge { display: inline-flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; padding: 8px 12px; border-radius: 999px; margin-bottom: 16px; background:#e3f2fd;color:#0d47a1; }
    .error-box { display:none; align-items:center; gap:8px; background:#ffebee; color:#b71c1c; padding:12px 14px; border-radius:12px; margin-bottom:16px; font-size:0.9rem; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display:block; margin-bottom:8px; color:#425466; font-size:0.9rem; font-weight:700; }
    .input-wrap { position: relative; }
    .input-wrap input, .input-wrap select { width:100%; border:1px solid rgba(148,163,184,.45); background:rgba(255,255,255,.9); border-radius:12px; padding:14px 42px 14px 14px; outline:none; transition:border-color .2s, box-shadow .2s; }
    .input-wrap input:focus, .input-wrap select:focus { border-color:#1a237e; box-shadow:0 0 0 3px rgba(26,35,126,.12); }
    .input-wrap i, .input-wrap svg { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:#64748b; width:18px; height:18px; }
    .eye-toggle { position:absolute; right:34px; top:50%; transform:translateY(-50%); border:none; background:transparent; color:#64748b; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .submit-btn { width:100%; border:none; border-radius:12px; padding:14px 18px; font-size:0.98rem; font-weight:800; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:8px; transition:transform .2s, opacity .2s; background:linear-gradient(135deg,#1a237e,#3949ab); color:white; }
    .submit-btn:hover { transform: translateY(-1px); }
    .submit-btn:disabled { opacity:.7; cursor:not-allowed; }
    .secondary-link { margin-top:12px; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:10px; }
    .secondary-link a { color:#1a237e; font-weight:700; text-decoration:none; }
    .secondary-link small { color:#64748b; }
    .mfa-panel { display:none; margin-top:16px; padding:14px; border-radius:14px; background:#f8fafc; border:1px solid rgba(148,163,184,.4); }
    .mfa-panel.active { display:block; }
    .card-footer { padding:14px 18px 18px; text-align:center; color:#6b7280; font-size:0.86rem; border-top:1px solid rgba(148,163,184,.25); background:rgba(255,255,255,.76); }
    @media (max-width:640px) { .login-wrapper{padding:12px} .card-body{padding:20px 16px 12px} .brand h1{letter-spacing:2px;font-size:.98rem} .brand-logos img.logo-main{height:52px} }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-logos">
        <img src="/images/logos/logo1.png" alt="Academia" class="logo-main">
        <img src="/images/logos/logo2.png" alt="Academia">
      </div>
      <h1>Student Information Management</h1>
    </div>

    <div class="login-card">
      <div class="card-body">
        <div class="portal-badge"><i data-lucide="shield-check"></i> Unified Login</div>
        <div class="error-box" id="login-err"><i data-lucide="alert-circle"></i><span></span></div>

        <form id="login-form" onsubmit="submitLogin(event)">
          <div class="input-group">
            <label for="identifier">Email / Index Number</label>
            <div class="input-wrap">
              <input id="identifier" type="text" placeholder="you@email.com or matric no." required autocomplete="username">
              <i data-lucide="mail"></i>
            </div>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input id="password" type="password" placeholder="Enter password" required autocomplete="current-password">
              <i data-lucide="lock"></i>
              <button type="button" class="eye-toggle" onclick="showHide('password', this)"><i data-lucide="eye"></i></button>
            </div>
            <div class="secondary-link">
              <small>Use your registered account credentials.</small>
              <a href="/forgot-password.html">Forgot password?</a>
            </div>
          </div>

          <button type="submit" class="submit-btn" id="login-btn"><i data-lucide="log-in"></i>Sign In</button>
        </form>

        <div id="mfa-panel" class="mfa-panel">
          <div class="input-group">
            <label for="otp-code">Enter MFA Code</label>
            <div class="input-wrap">
              <input id="otp-code" type="text" maxlength="6" placeholder="6-digit code sent to your email" required>
              <i data-lucide="shield-check"></i>
            </div>
          </div>
          <button type="button" class="submit-btn" id="verify-mfa-btn" onclick="verifyMfa()"><i data-lucide="check-circle"></i>Verify MFA</button>
        </div>
      </div>
      <div class="card-footer">Secured with end-to-end encryption</div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    // Check if there is an active server session before redirecting.
    // A stale localStorage entry (expired cookie) must NOT cause a blank-screen loop.
    (async function checkExistingSession() {
      const user = localStorage.getItem('user');
      if (!user) return; // No stored session — stay on login page
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (res.ok) {
          window.location.href = '/dashboard';
        } else {
          // Session expired on server — clear stale localStorage and stay on login
          localStorage.removeItem('user');
          localStorage.removeItem('token');
        }
      } catch {
        // Network error or endpoint missing — just stay on login page
        localStorage.removeItem('user');
        localStorage.removeItem('token');
      }
    })();


    let pendingChallengeToken = null;

    function showHide(id, btn) {
      const el = document.getElementById(id);
      const isPassword = el.type === 'password';
      el.type = isPassword ? 'text' : 'password';
      const icon = btn.querySelector('i');
      icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
      lucide.createIcons();
    }

    function showErr(msg) {
      const box = document.getElementById('login-err');
      box.querySelector('span').textContent = msg;
      box.style.display = 'flex';
      setTimeout(() => box.style.display = 'none', 8000);
    }

    async function submitLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader"></i>Signing in...';
      lucide.createIcons();
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier: document.getElementById('identifier').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed.');

        if (data.mfaRequired) {
          pendingChallengeToken = data.challengeToken;
          document.getElementById('mfa-panel').classList.add('active');
          showErr('Please enter the 6-digit code sent to your registered email.');
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="log-in"></i>Sign In';
          lucide.createIcons();
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        showErr(err.message);
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="log-in"></i>Sign In';
        lucide.createIcons();
      }
    }

    async function verifyMfa() {
      const otpCode = document.getElementById('otp-code').value.trim();
      if (!pendingChallengeToken || !otpCode) {
        showErr('Enter the verification code to continue.');
        return;
      }
      const verifyBtn = document.getElementById('verify-mfa-btn');
      verifyBtn.disabled = true;
      verifyBtn.innerHTML = '<i data-lucide="loader"></i>Verifying...';
      lucide.createIcons();
      try {
        const res = await fetch('/api/auth/verify-mfa', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ challengeToken: pendingChallengeToken, otpCode })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'MFA verification failed.');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (err) {
        showErr(err.message);
        verifyBtn.disabled = false;
        verifyBtn.innerHTML = '<i data-lucide="check-circle"></i>Verify MFA';
        lucide.createIcons();
      }
    }
  </script>
</body>
</html>

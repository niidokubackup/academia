<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia - Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #c5c0c0 0%, #fcfcfc 40%, #cad0f7 100%);
      padding: 20px;
      overflow: hidden;
    }

    .bg-shapes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-shapes div {
      position: absolute;
      border-radius: 50%;
      opacity: 0.06;
      background: rgba(255, 255, 255, 0.644);
    }
    .bg-shapes .s1 { width: 400px; height: 400px; top: -100px; right: -100px; }
    .bg-shapes .s2 { width: 300px; height: 300px; bottom: -80px; left: -80px; }
    .bg-shapes .s3 { width: 200px; height: 200px; top: 40%; left: 60%; }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
      color: white;
    }
    .brand-logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .brand-logos img {
      height: 70px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
      transition: transform 0.3s;
    }
    .brand-logos img:hover {
      transform: scale(1.05);
    }
    .brand-logos img.logo-main {
      height: 80px;
    }
    .brand h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 3px;
    }
    .brand h1 span { color: #ffa040; }
    .brand p {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .login-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    /* Flip Toggle */
    .flip-toggle {
      display: flex;
      position: relative;
      background: #f0f0f0;
      margin: 0;
      padding: 0;
    }
    .flip-toggle-bg {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: var(--primary);
      border-radius: 10px;
      transition: transform 0.4s cubic-bezier(0.68, -0.15, 0.27, 1.15);
      box-shadow: 0 2px 8px rgba(7, 28, 255, 0.637);
      z-index: 0;
    }
    .flip-toggle-bg.staff-active {
      transform: translateX(100%);
    }
    .flip-btn {
      flex: 1;
      padding: 14px 0;
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.88rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
      transition: color 0.3s;
      color: #dfdbdbc7;
      user-select: none;
    }
    .flip-btn.active {
      color: white;
    }
    .flip-btn .flip-icon {
      display: block;
      font-size: 1.3rem;
      margin-bottom: 2px;
    }

    /* Card body with flip animation */
    .card-body {
      position: relative;
      overflow: hidden;
    }
    .form-panel {
      padding: 28px 28px 24px;
      transition: opacity 0.3s, transform 0.4s;
    }
    .form-panel.flip-out-up {
      opacity: 0;
      transform: translateY(-20px);
    }
    .form-panel.flip-out-down {
      opacity: 0;
      transform: translateY(20px);
    }
    .form-panel.flip-in {
      opacity: 1;
      transform: translateY(0);
    }

    .portal-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 18px;
    }
    .portal-badge.student { background: #e3f2fd; color: #0277bd; }
    .portal-badge.staff { background: #f3e5f5; color: #02afff; }

    .portal-badge .lock-icon { font-size: 0.85rem; }

    .form-panel h3 {
      font-size: 1.15rem;
      color: #1a237e;
      margin-bottom: 18px;
    }

    .input-group {
      margin-bottom: 16px;
    }
    .input-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #616161;
      margin-bottom: 5px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap input,
    .input-wrap select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.3s, box-shadow 0.3s;
      background: white;
      color: #212121;
    }
    .input-wrap input:focus,
    .input-wrap select:focus {
      outline: none;
      border-color: #1a237e;
      box-shadow: 0 0 0 3px rgba(26,35,126,0.1);
    }
    .input-wrap input::placeholder { color: #bbb; }
    .input-wrap .eye-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      opacity: 0.4;
      transition: opacity 0.2s;
    }
    .input-wrap .eye-toggle:hover { opacity: 1; }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 4px;
      letter-spacing: 0.5px;
    }
    .submit-btn.student-btn {
      background: linear-gradient(135deg, #1a237e, #3949ab);
      color: white;
    }
    .submit-btn.staff-btn {
      background: linear-gradient(135deg, #5081eb, #02afff);
      color: white;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .switch-mode {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #888;
    }
    .switch-mode a {
      color: #0f20db;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .switch-mode a:hover { text-decoration: underline; }

    .error-box {
      background: #ffebee;
      color: #c62828;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 0.85rem;
      display: none;
    }

    .password-strength {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
    }
    .strength-track {
      flex: 1;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-size: 0.72rem;
      font-weight: 700;
      min-width: 80px;
    }

    .card-footer {
      text-align: center;
      padding: 12px;
      border-top: 1px solid rgba(255,255,255,0.4);
      font-size: 0.75rem;
      color: var(--text-secondary);
      backdrop-filter: blur(10px);
    }

    @media (max-width: 480px) {
      .login-wrapper { max-width: 100%; }
      .form-panel { padding: 22px 20px 20px; }
    }
  </style>
</head>
<body>
  <div class="bg-shapes">
    <div class="s1"></div>
    <div class="s2"></div>
    <div class="s3"></div>
  </div>

  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-logos">
        <img src="/images/logos/logo1.png" alt="Logo" class="logo-secondary">
        <img src="/images/logos/logo2.png" alt="Academia" class="logo-main">  
      </div>
      <h1>Student Information Management System</h1>
    </div>

    <div class="login-card">
      <div class="flip-toggle" id="flip-toggle">
        <div class="flip-toggle-bg" id="toggle-bg"></div>
        <div class="flip-btn active" id="btn-student" onclick="flipTo('student')">
          <span class="flip-icon">&#127891;</span>
          Student
        </div>
        <div class="flip-btn" id="btn-staff" onclick="flipTo('staff')">
          <span class="flip-icon">&#128104;&#8205;&#127979;</span>
          Staff
        </div>
      </div>

      <div class="card-body" id="card-body">

        <!-- STUDENT LOGIN -->
        <div class="form-panel flip-in" id="panel-student-login">
          <div class="portal-badge student"><span class="lock-icon">&#128274;</span> Student Portal</div>
          <div class="error-box" id="s-err"></div>
          <form onsubmit="studentLogin(event)">
            <div class="input-group">
              <label>Email / index number</label>
              <div class="input-wrap">
                <input type="text" id="s-email" placeholder="you@email.com or matric no." required autocomplete="username">
              </div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrap">
                <input type="password" id="s-pass" placeholder="Enter password" required autocomplete="current-password">
                <button type="button" class="eye-toggle" onclick="showHide('s-pass')">&#128065;</button>
              </div>
            </div>
            <button type="submit" class="submit-btn student-btn" id="s-btn">log In</button>
          </form>
          <div class="switch-mode">New student? <a onclick="flipForm('student-register')">Create Account</a></div>
        </div>

        <!-- STUDENT REGISTER -->
        <div class="form-panel" id="panel-student-register" style="display:none">
          <div class="portal-badge student">&#127891; Student Registration</div>
          <div class="error-box" id="sr-err"></div>
          <form onsubmit="studentRegister(event)">
            <div class="input-group">
              <label>Full Name</label>
              <div class="input-wrap"><input type="text" id="sr-name" placeholder="John Doe" required></div>
            </div>
            <div class="input-group">
              <label>Email</label>
              <div class="input-wrap"><input type="email" id="sr-email" placeholder="you@email.com" required></div>
            </div>
            <div class="input-group">
              <label>Index Number</label>
              <div class="input-wrap"><input type="text" id="sr-matric" placeholder="e.g. 20240001" required></div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrap">
                <input type="password" id="sr-pass" placeholder="Min 6 characters" required minlength="6" oninput="strength(this.value,'sr-str')">
                <button type="button" class="eye-toggle" onclick="showHide('sr-pass')">&#128065;</button>
              </div>
              <div class="password-strength" id="sr-str"></div>
            </div>
            <div class="input-row">
              <div class="input-group">
                <label>School</label>
                <div class="input-wrap">
                  <select id="sr-school" required>
                    <option value="">Select</option>
                    <option>School of Engineering</option><option>School of Sciences</option><option>School of Arts</option>
                    <option>School of Business</option><option>School of Medicine</option><option>School of Law</option>
                    <option>School of Education</option><option>School of Agriculture</option>
                    <option>School of Environmental Sciences</option><option>School of Social Sciences</option>
                  </select>
                </div>
              </div>
              <div class="input-group">
                <label>Level</label>
                <div class="input-wrap">
                  <select id="sr-level">
                    <option value="L100">100</option><option value="L200">200</option>
                    <option value="L300">300</option><option value="L400">400</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="input-group">
              <label>Department</label>
              <div class="input-wrap"><input type="text" id="sr-dept" placeholder="e.g. Computer Science"></div>
            </div>
            <button type="submit" class="submit-btn student-btn" id="sr-btn">Create Account</button>
          </form>
          <div class="switch-mode">Already have an account? <a onclick="flipForm('student-login')">log In</a></div>
        </div>

        <!-- STAFF LOGIN -->
        <div class="form-panel" id="panel-staff-login" style="display:none">
          <div class="portal-badge staff"><span class="lock-icon">&#128274;</span> Staff Portal</div>
          <div class="error-box" id="st-err"></div>
          <form onsubmit="staffLogin(event)">
            <div class="input-group">
              <label>Email Address</label>
              <div class="input-wrap">
                <input type="email" id="st-email" placeholder="you@email.com" required autocomplete="username">
              </div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrap">
                <input type="password" id="st-pass" placeholder="Enter password" required autocomplete="current-password">
                <button type="button" class="eye-toggle" onclick="showHide('st-pass')">&#128065;</button>
              </div>
            </div>
            <button type="submit" class="submit-btn staff-btn" id="st-btn">log In</button>
          </form>
          <div class="switch-mode">New staff? <a onclick="flipForm('staff-register')">Create Account</a></div>
        </div>

        <!-- STAFF REGISTER -->
        <div class="form-panel" id="panel-staff-register" style="display:none">
          <div class="portal-badge staff">&#128104;&#8205;&#127979; Staff Registration</div>
          <div class="error-box" id="str-err"></div>
          <form onsubmit="staffRegister(event)">
            <div class="input-group">
              <label>Full Name</label>
              <div class="input-wrap"><input type="text" id="str-name" placeholder="Dr. John Smith" required></div>
            </div>
            <div class="input-group">
              <label>Email</label>
              <div class="input-wrap"><input type="email" id="str-email" placeholder="you@email.com" required></div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrap">
                <input type="password" id="str-pass" placeholder="Min 6 characters" required minlength="6" oninput="strength(this.value,'str-str')">
                <button type="button" class="eye-toggle" onclick="showHide('str-pass')">&#128065;</button>
              </div>
              <div class="password-strength" id="str-str"></div>
            </div>
            <div class="input-group">
              <label>Role</label>
              <div class="input-wrap">
                <select id="str-role">
                  <option value="lecturer">Lecturer</option>
                  <option value="admin">Administrator</option>
                </select>
              </div>
            </div>
            <div class="input-group">
              <label>School</label>
              <div class="input-wrap">
                <select id="str-school" required>
                  <option value="">Select</option>
                  <option>School of Engineering</option><option>School of Sciences</option><option>School of Arts</option>
                  <option>School of Business</option><option>School of Medicine</option><option>School of Law</option>
                  <option>School of Education</option><option>School of Agriculture</option>
                  <option>School of Environmental Sciences</option><option>School of Social Sciences</option>
                </select>
              </div>
            </div>
            <div class="input-group">
              <label>Department</label>
              <div class="input-wrap"><input type="text" id="str-dept" placeholder="e.g. Computer Science"></div>
            </div>
            <button type="submit" class="submit-btn staff-btn" id="str-btn">Create Account</button>
          </form>
          <div class="switch-mode">Already have an account? <a onclick="flipForm('staff-login')">Sign In</a></div>
        </div>

      </div>

      <div class="card-footer"></div>
    </div>
  </div>

  <script>
    const user = localStorage.getItem('user');
    if (user) window.location.href = '/dashboard';

    let currentRole = 'student';
    let currentPanel = 'student-login';
    let animating = false;
    let loginAttempts = {};

    function flipTo(role) {
      if (role === currentRole || animating) return;
      animating = true;

      const bg = document.getElementById('toggle-bg');
      const oldPanel = document.getElementById('panel-' + currentPanel);
      const isGoingDown = (role === 'staff');

      bg.classList.toggle('staff-active', role === 'staff');
      document.getElementById('btn-student').classList.toggle('active', role === 'student');
      document.getElementById('btn-staff').classList.toggle('active', role === 'staff');

      oldPanel.classList.add(isGoingDown ? 'flip-out-up' : 'flip-out-down');

      setTimeout(() => {
        oldPanel.style.display = 'none';
        oldPanel.classList.remove('flip-out-up', 'flip-out-down');

        const newPanelName = role + '-login';
        const newPanel = document.getElementById('panel-' + newPanelName);
        newPanel.style.display = 'block';
        newPanel.classList.remove('flip-in');
        newPanel.classList.add(isGoingDown ? 'flip-out-down' : 'flip-out-up');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            newPanel.classList.remove('flip-out-down', 'flip-out-up');
            newPanel.classList.add('flip-in');
          });
        });

        currentRole = role;
        currentPanel = newPanelName;
        animating = false;
      }, 250);
    }

    function flipForm(panelName) {
      if (animating) return;
      animating = true;

      const oldPanel = document.getElementById('panel-' + currentPanel);
      const newPanel = document.getElementById('panel-' + panelName);
      const isGoingDown = panelName.includes('register');

      oldPanel.classList.add(isGoingDown ? 'flip-out-up' : 'flip-out-down');

      setTimeout(() => {
        oldPanel.style.display = 'none';
        oldPanel.classList.remove('flip-out-up', 'flip-out-down');

        newPanel.style.display = 'block';
        newPanel.classList.remove('flip-in');
        newPanel.classList.add(isGoingDown ? 'flip-out-down' : 'flip-out-up');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            newPanel.classList.remove('flip-out-down', 'flip-out-up');
            newPanel.classList.add('flip-in');
          });
        });

        currentPanel = panelName;
        animating = false;
      }, 250);
    }

    function showHide(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    function strength(val, id) {
      const el = document.getElementById(id);
      if (!val) { el.innerHTML = ''; return; }
      let s = 0;
      if (val.length >= 6) s++;
      if (val.length >= 10) s++;
      if (/[A-Z]/.test(val)) s++;
      if (/[0-9]/.test(val)) s++;
      if (/[^A-Za-z0-9]/.test(val)) s++;
      const levels = [
        { l: 'Very Weak', c: '#c62828', w: '20%' },
        { l: 'Weak', c: '#e65100', w: '40%' },
        { l: 'Fair', c: '#f57f17', w: '60%' },
        { l: 'Strong', c: '#2e7d32', w: '80%' },
        { l: 'Very Strong', c: '#1b5e20', w: '100%' }
      ];
      const lv = levels[Math.min(s, 4)];
      el.innerHTML = `<div class="strength-track"><div class="strength-fill" style="width:${lv.w};background:${lv.c}"></div></div><span class="strength-label" style="color:${lv.c}">${lv.l}</span>`;
    }

    function showErr(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 8000);
    }

    function checkRL(key) {
      if (!loginAttempts[key]) loginAttempts[key] = { c: 0, t: 0 };
      const now = Date.now();
      if (now - loginAttempts[key].t > 900000) loginAttempts[key] = { c: 0, t: now };
      if (loginAttempts[key].c >= 5) {
        const rem = Math.ceil((loginAttempts[key].t + 900000 - now) / 60000);
        return { blocked: true, remaining: rem };
      }
      return { blocked: false };
    }

    function failRL(key) {
      if (!loginAttempts[key]) loginAttempts[key] = { c: 0, t: 0 };
      loginAttempts[key].c++;
      loginAttempts[key].t = Date.now();
    }

    function clearRL(key) {
      loginAttempts[key] = { c: 0, t: 0 };
    }

    async function studentLogin(e) {
      e.preventDefault();
      const rl = checkRL('s');
      if (rl.blocked) { showErr('s-err', `Too many attempts. Wait ${rl.remaining} min.`); return; }
      const btn = document.getElementById('s-btn');
      btn.textContent = 'Signing in...'; btn.disabled = true;
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier: document.getElementById('s-email').value, password: document.getElementById('s-pass').value, loginType: 'student' })
        });
        const d = await r.json();
        if (!r.ok) { failRL('s'); throw new Error(d.error); }
        clearRL('s');
        localStorage.setItem('user', JSON.stringify(d.user));
        localStorage.setItem('token', d.token);
        window.location.href = '/dashboard';
      } catch (err) { showErr('s-err', err.message); }
      finally { btn.textContent = 'Sign In'; btn.disabled = false; }
    }

    async function staffLogin(e) {
      e.preventDefault();
      const rl = checkRL('st');
      if (rl.blocked) { showErr('st-err', `Too many attempts. Wait ${rl.remaining} min.`); return; }
      const btn = document.getElementById('st-btn');
      btn.textContent = 'Signing in...'; btn.disabled = true;
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier: document.getElementById('st-email').value, password: document.getElementById('st-pass').value, loginType: 'staff' })
        });
        const d = await r.json();
        if (!r.ok) { failRL('st'); throw new Error(d.error); }
        clearRL('st');
        localStorage.setItem('user', JSON.stringify(d.user));
        localStorage.setItem('token', d.token);
        window.location.href = '/dashboard';
      } catch (err) { showErr('st-err', err.message); }
      finally { btn.textContent = 'Sign In'; btn.disabled = false; }
    }

    async function studentRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('sr-btn');
      btn.textContent = 'Creating...'; btn.disabled = true;
      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            full_name: document.getElementById('sr-name').value,
            email: document.getElementById('sr-email').value,
            password: document.getElementById('sr-pass').value,
            role: 'student',
            school: document.getElementById('sr-school').value,
            department: document.getElementById('sr-dept').value,
            level: document.getElementById('sr-level').value,
            matric_number: document.getElementById('sr-matric').value
          })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        localStorage.setItem('user', JSON.stringify(d.user));
        localStorage.setItem('token', d.token);
        window.location.href = '/dashboard';
      } catch (err) { showErr('sr-err', err.message); }
      finally { btn.textContent = 'Create Account'; btn.disabled = false; }
    }

    async function staffRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('str-btn');
      btn.textContent = 'Creating...'; btn.disabled = true;
      try {
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            full_name: document.getElementById('str-name').value,
            email: document.getElementById('str-email').value,
            password: document.getElementById('str-pass').value,
            role: document.getElementById('str-role').value,
            school: document.getElementById('str-school').value,
            department: document.getElementById('str-dept').value
          })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        localStorage.setItem('user', JSON.stringify(d.user));
        localStorage.setItem('token', d.token);
        window.location.href = '/dashboard';
      } catch (err) { showErr('str-err', err.message); }
      finally { btn.textContent = 'Create Account'; btn.disabled = false; }
    }
  </script>
</body>
</html>

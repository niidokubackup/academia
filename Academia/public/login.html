<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia - Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8eaf6 0%, #f5f5f5 40%, #e3f2fd 100%);
      overflow: hidden;
      position: relative;
    }

    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: orbFloat 20s ease-in-out infinite;
    }

    .orb-1 {
      width: 400px; height: 400px;
      background: rgba(59,130,246,0.08);
      top: -10%; left: -5%;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 350px; height: 350px;
      background: rgba(139,92,246,0.08);
      bottom: -10%; right: -5%;
      animation-delay: -7s;
    }

    .orb-3 {
      width: 250px; height: 250px;
      background: rgba(249,115,22,0.06);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -14s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(40px, 30px) scale(1.02); }
    }

    .login-wrapper {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      padding: 20px;
      animation: wrapperIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes wrapperIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .brand-logos img {
      height: 56px;
      filter: drop-shadow(0 4px 20px rgba(59,130,246,0.2));
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .brand-logos img:hover { transform: scale(1.08) rotate(-2deg); }
    .brand-logos img.logo-main { height: 68px; }

    .brand h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a237e;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    /* Login Card */
    .login-card {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 20px 60px rgba(0,0,0,0.06);
      transition: box-shadow 0.4s;
    }

    .login-card:focus-within {
      box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 0 0 2px rgba(26,35,126,0.12);
    }

    /* Flip Toggle */
    .flip-toggle {
      display: flex;
      position: relative;
      background: #f1f5f9;
      margin: 0;
      padding: 4px;
      gap: 4px;
    }

    .flip-toggle-bg {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 6px);
      height: calc(100% - 8px);
      background: linear-gradient(135deg, #1a237e, #3949ab);
      border-radius: 12px;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 20px rgba(26,35,126,0.3);
      z-index: 0;
    }

    .flip-toggle-bg.staff-active {
      transform: translateX(100%);
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      box-shadow: 0 4px 20px rgba(139,92,246,0.3);
    }

    .flip-btn {
      flex: 1;
      padding: 14px 0;
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      position: relative;
      z-index: 1;
      transition: color 0.3s;
      color: #94a3b8;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 12px;
    }

    .flip-btn.active { color: white; }
    .flip-btn:hover:not(.active) { color: #64748b; }

    .flip-btn svg {
      width: 18px;
      height: 18px;
      stroke-width: 2;
    }

    /* Card body */
    .card-body {
      position: relative;
      overflow: hidden;
    }

    .form-panel {
      padding: 32px 28px 28px;
      transition: opacity 0.7s, transform 0.4s;
    }

    .form-panel.flip-out-up { opacity: 0; transform: translateY(-20px); }
    .form-panel.flip-out-down { opacity: 0; transform: translateY(20px); }
    .form-panel.flip-in { opacity: 1; transform: translateY(0); }

    /* Portal badge */
    .portal-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 24px;
    }

    .portal-badge svg {
      width: 14px;
      height: 14px;
      stroke-width: 2.5;
    }

    .portal-badge.student {
      background: #e3f2fd;
      color: #1565c0;
      border: 1px solid #bbdefb;
    }

    .portal-badge.staff {
      background: #ede7f6;
      color: #7b1fa2;
      border: 1px solid #d1c4e9;
    }

    .form-panel h3 {
      font-size: 1.3rem;
      color: #1a237e;
      margin-bottom: 24px;
      font-weight: 700;
    }

    /* Floating input */
    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: #94a3b8;
      pointer-events: none;
      transition: color 0.3s;
      stroke-width: 1.8;
    }

    .input-wrap input,
    .input-wrap select {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.95rem;
      transition: all 0.3s;
      background: #f8fafc;
      color: #1e293b;
      font-family: inherit;
    }

    .input-wrap input::placeholder { color: #94a3b8; }

    .input-wrap input:focus,
    .input-wrap select:focus {
      outline: none;
      border-color: #1a237e;
      background: white;
      box-shadow: 0 0 0 4px rgba(26,35,126,0.08);
    }

    .input-wrap.staff-focused input:focus,
    .input-wrap.staff-focused select:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 4px rgba(139,92,246,0.1);
    }

    .input-wrap input:focus + svg,
    .input-wrap input:focus ~ svg {
      color: #1a237e;
    }

    .input-wrap select {
      appearance: none;
      cursor: pointer;
    }

    .input-wrap select option {
      background: white;
      color: #1e293b;
    }

    .input-wrap .eye-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #94a3b8;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }

    .input-wrap .eye-toggle:hover { color: #334155; }

    .input-wrap .eye-toggle svg {
      position: static;
      transform: none;
      pointer-events: auto;
      width: 18px;
      height: 18px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      font-family: inherit;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .submit-btn:hover::before { opacity: 1; }

    .submit-btn.student-btn {
      background: linear-gradient(135deg, #1a237e, #3949ab);
      color: white;
      box-shadow: 0 4px 20px rgba(26,35,126,0.25);
    }

    .submit-btn.student-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(26,35,126,0.35);
    }

    .submit-btn.staff-btn {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      color: white;
      box-shadow: 0 4px 20px rgba(139,92,246,0.25);
    }

    .submit-btn.staff-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(139,92,246,0.35);
    }

    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .submit-btn svg {
      width: 18px;
      height: 18px;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
      stroke-width: 2.2;
    }

    /* Switch mode link */
    .switch-mode {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .switch-mode a {
      color: #1a237e;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }

    .switch-mode a:hover { color: #3949ab; text-decoration: underline; }

    .switch-mode.staff-link a {
      color: #7b1fa2;
    }

    .switch-mode.staff-link a:hover {
      color: #9c27b0;
    }

    /* Error box */
    .error-box {
      background: #ffebee;
      border: 1px solid #ffcdd2;
      color: #c62828;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .error-box svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      stroke-width: 2;
    }

    /* Password strength */
    .password-strength {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }

    .strength-track {
      flex: 1;
      height: 3px;
      background: #e2e8f0;
      border-radius: 2px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
    }

    .strength-label {
      font-size: 0.7rem;
      font-weight: 700;
      min-width: 80px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Footer */
    .card-footer {
      text-align: center;
      padding: 16px;
      font-size: 0.72rem;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-wrapper { max-width: 100%; padding: 16px; }
      .form-panel { padding: 24px 20px 20px; }
      .brand h1 { font-size: 0.85rem; letter-spacing: 2px; }
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-logos">
        <img src="/images/logos/logo1.png" alt="Logo" class="logo-secondary">
        <img src="/images/logos/logo2.png" alt="Academia" class="logo-main">  
      </div>
      <h1>Student Information Management</h1>
    </div>

    <div class="login-card">
      <div class="flip-toggle" id="flip-toggle">
        <div class="flip-toggle-bg" id="toggle-bg"></div>
        <div class="flip-btn active" id="btn-student" onclick="flipTo('student')">
          <i data-lucide="graduation-cap"></i>
          Student
        </div>
        <div class="flip-btn" id="btn-staff" onclick="flipTo('staff')">
          <i data-lucide="briefcase"></i>
          Staff
        </div>
      </div>

      <div class="card-body" id="card-body">

        <!-- STUDENT LOGIN -->
        <div class="form-panel flip-in" id="panel-student-login">
          <div class="portal-badge student"><i data-lucide="shield-check"></i> Student Portal</div>
          <div class="error-box" id="s-err">
            <i data-lucide="alert-circle"></i>
            <span></span>
          </div>
          <form onsubmit="studentLogin(event)">
            <div class="input-group">
              <label>Email / Index Number</label>
              <div class="input-wrap">
                <input type="text" id="s-email" placeholder="you@email.com or matric no." required autocomplete="username">
                <i data-lucide="mail"></i>
              </div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrap">
                <input type="password" id="s-pass" placeholder="Enter password" required autocomplete="current-password">
                <i data-lucide="lock"></i>
                <button type="button" class="eye-toggle" onclick="showHide('s-pass', this)">
                  <i data-lucide="eye"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="submit-btn student-btn" id="s-btn">
              <i data-lucide="log-in"></i>Sign In
            </button>
          </form>
          <div class="switch-mode">New student? <a onclick="flipForm('student-register')">Create Account</a></div>
        </div>

        <!-- STUDENT REGISTER -->
        <div class="form-panel" id="panel-student-register" style="display:none">
          <div class="portal-badge student"><i data-lucide="user-plus"></i> Student Registration</div>
          <div class="error-box" id="sr-err">
            <i data-lucide="alert-circle"></i>
            <span></span>
          </div>
          <form onsubmit="studentRegister(event)">
            <div class="input-group">
              <label>Full Name</label>
              <div class="input-wrap">
                <input type="text" id="sr-name" placeholder="John Doe" required>
                <i data-lucide="user"></i>
              </div>
            </div>
            <div class="input-group">
              <label>Email</label>
              <div class="input-wrap">
                <input type="email" id="sr-email" placeholder="you@email.com" required>
                <i data-lucide="mail"></i>
              </div>
            </div>
            <div class="input-group">
              <label>Index Number</label>
              <div class="input-wrap">
                <input type="text" id="sr-matric" placeholder="e.g. 20240001" required>
                <i data-lucide="hash"></i>
              </div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrap">
                <input type="password" id="sr-pass" placeholder="Min 6 characters" required minlength="6" oninput="strength(this.value,'sr-str')">
                <i data-lucide="lock"></i>
                <button type="button" class="eye-toggle" onclick="showHide('sr-pass', this)">
                  <i data-lucide="eye"></i>
                </button>
              </div>
              <div class="password-strength" id="sr-str"></div>
            </div>
            <div class="input-row">
              <div class="input-group">
                <label>School</label>
                <div class="input-wrap">
                  <select id="sr-school" required>
                    <option value="">Select</option>
                    <option>School of Engineering</option><option>School of Sciences</option><option>School of Arts</option>
                    <option>School of Business</option><option>School of Medicine</option><option>School of Law</option>
                    <option>School of Education</option><option>School of Agriculture</option>
                    <option>School of Environmental Sciences</option><option>School of Social Sciences</option>
                  </select>
                  <i data-lucide="building-2"></i>
                </div>
              </div>
              <div class="input-group">
                <label>Level</label>
                <div class="input-wrap">
                  <select id="sr-level">
                    <option value="L100">100</option><option value="L200">200</option>
                    <option value="L300">300</option><option value="L400">400</option>
                  </select>
                  <i data-lucide="layers"></i>
                </div>
              </div>
            </div>
            <div class="input-group">
              <label>Department</label>
              <div class="input-wrap">
                <input type="text" id="sr-dept" placeholder="e.g. Computer Science">
                <i data-lucide="book-open"></i>
              </div>
            </div>
            <button type="submit" class="submit-btn student-btn" id="sr-btn">
              <i data-lucide="user-plus"></i>Create Account
            </button>
          </form>
          <div class="switch-mode">Already have an account? <a onclick="flipForm('student-login')">Sign In</a></div>
        </div>

        <!-- STAFF LOGIN -->
        <div class="form-panel" id="panel-staff-login" style="display:none">
          <div class="portal-badge staff"><i data-lucide="shield-check"></i> Staff Portal</div>
          <div class="error-box" id="st-err">
            <i data-lucide="alert-circle"></i>
            <span></span>
          </div>
          <form onsubmit="staffLogin(event)">
            <div class="input-group">
              <label>Email Address</label>
              <div class="input-wrap staff-focused">
                <input type="email" id="st-email" placeholder="you@email.com" required autocomplete="username">
                <i data-lucide="mail"></i>
              </div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrap staff-focused">
                <input type="password" id="st-pass" placeholder="Enter password" required autocomplete="current-password">
                <i data-lucide="lock"></i>
                <button type="button" class="eye-toggle" onclick="showHide('st-pass', this)">
                  <i data-lucide="eye"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="submit-btn staff-btn" id="st-btn">
              <i data-lucide="log-in"></i>Sign In
            </button>
          </form>
          <div class="switch-mode staff-link">New staff? <a onclick="flipForm('staff-register')">Create Account</a></div>
        </div>

        <!-- STAFF REGISTER -->
        <div class="form-panel" id="panel-staff-register" style="display:none">
          <div class="portal-badge staff"><i data-lucide="user-plus"></i> Staff Registration</div>
          <div class="error-box" id="str-err">
            <i data-lucide="alert-circle"></i>
            <span></span>
          </div>
          <form onsubmit="staffRegister(event)">
            <div class="input-group">
              <label>Full Name</label>
              <div class="input-wrap staff-focused">
                <input type="text" id="str-name" placeholder="Dr. John Smith" required>
                <i data-lucide="user"></i>
              </div>
            </div>
            <div class="input-group">
              <label>Email</label>
              <div class="input-wrap staff-focused">
                <input type="email" id="str-email" placeholder="you@email.com" required>
                <i data-lucide="mail"></i>
              </div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrap staff-focused">
                <input type="password" id="str-pass" placeholder="Min 6 characters" required minlength="6" oninput="strength(this.value,'str-str')">
                <i data-lucide="lock"></i>
                <button type="button" class="eye-toggle" onclick="showHide('str-pass', this)">
                  <i data-lucide="eye"></i>
                </button>
              </div>
              <div class="password-strength" id="str-str"></div>
            </div>
            <div class="input-group">
              <label>Role</label>
              <div class="input-wrap staff-focused">
                <select id="str-role">
                  <option value="lecturer">Lecturer</option>
                  <option value="admin">Administrator</option>
                </select>
                <i data-lucide="briefcase"></i>
              </div>
            </div>
            <div class="input-group">
              <label>School</label>
              <div class="input-wrap staff-focused">
                <select id="str-school" required>
                  <option value="">Select</option>
                  <option>School of Engineering</option><option>School of Sciences</option><option>School of Arts</option>
                  <option>School of Business</option><option>School of Medicine</option><option>School of Law</option>
                  <option>School of Education</option><option>School of Agriculture</option>
                  <option>School of Environmental Sciences</option><option>School of Social Sciences</option>
                </select>
                <i data-lucide="building-2"></i>
              </div>
            </div>
            <div class="input-group">
              <label>Department</label>
              <div class="input-wrap staff-focused">
                <input type="text" id="str-dept" placeholder="e.g. Computer Science">
                <i data-lucide="book-open"></i>
              </div>
            </div>
            <button type="submit" class="submit-btn staff-btn" id="str-btn">
              <i data-lucide="user-plus"></i>Create Account
            </button>
          </form>
          <div class="switch-mode staff-link">Already have an account? <a onclick="flipForm('staff-login')">Sign In</a></div>
        </div>

      </div>

      <div class="card-footer">Secured with end-to-end encryption</div>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const user = localStorage.getItem('user');
    if (user) window.location.href = '/dashboard';

    let currentRole = 'student';
    let currentPanel = 'student-login';
    let animating = false;
    let loginAttempts = {};

    function flipTo(role) {
      if (role === currentRole || animating) return;
      animating = true;

      const bg = document.getElementById('toggle-bg');
      const oldPanel = document.getElementById('panel-' + currentPanel);
      const isGoingDown = (role === 'staff');

      bg.classList.toggle('staff-active', role === 'staff');
      document.getElementById('btn-student').classList.toggle('active', role === 'student');
      document.getElementById('btn-staff').classList.toggle('active', role === 'staff');

      oldPanel.classList.add(isGoingDown ? 'flip-out-up' : 'flip-out-down');

      setTimeout(() => {
        oldPanel.style.display = 'none';
        oldPanel.classList.remove('flip-out-up', 'flip-out-down');

        const newPanelName = role + '-login';
        const newPanel = document.getElementById('panel-' + newPanelName);
        newPanel.style.display = 'block';
        newPanel.classList.remove('flip-in');
        newPanel.classList.add(isGoingDown ? 'flip-out-down' : 'flip-out-up');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            newPanel.classList.remove('flip-out-down', 'flip-out-up');
            newPanel.classList.add('flip-in');
          });
        });

        currentRole = role;
        currentPanel = newPanelName;
        animating = false;
      }, 250);
    }

    function flipForm(panelName) {
      if (animating) return;
      animating = true;

      const oldPanel = document.getElementById('panel-' + currentPanel);
      const newPanel = document.getElementById('panel-' + panelName);
      const isGoingDown = panelName.includes('register');

      oldPanel.classList.add(isGoingDown ? 'flip-out-up' : 'flip-out-down');

      setTimeout(() => {
        oldPanel.style.display = 'none';
        oldPanel.classList.remove('flip-out-up', 'flip-out-down');

        newPanel.style.display = 'block';
        newPanel.classList.remove('flip-in');
        newPanel.classList.add(isGoingDown ? 'flip-out-down' : 'flip-out-up');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            newPanel.classList.remove('flip-out-down', 'flip-out-up');
            newPanel.classList.add('flip-in');
          });
        });

        currentPanel = panelName;
        animating = false;
      }, 250);
    }

    function showHide(id, btn) {
      const el = document.getElementById(id);
      const isPassword = el.type === 'password';
      el.type = isPassword ? 'text' : 'password';

      const icon = btn.querySelector('i');
      icon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
      lucide.createIcons();
    }

    function strength(val, id) {
      const el = document.getElementById(id);
      if (!val) { el.innerHTML = ''; return; }
      let s = 0;
      if (val.length >= 6) s++;
      if (val.length >= 10) s++;
      if (/[A-Z]/.test(val)) s++;
      if (/[0-9]/.test(val)) s++;
      if (/[^A-Za-z0-9]/.test(val)) s++;
      const levels = [
        { l: 'Very Weak', c: '#ef4444', w: '20%' },
        { l: 'Weak', c: '#f97316', w: '40%' },
        { l: 'Fair', c: '#eab308', w: '60%' },
        { l: 'Strong', c: '#22c55e', w: '80%' },
        { l: 'Very Strong', c: '#10b981', w: '100%' }
      ];
      const lv = levels[Math.min(s, 4)];
      el.innerHTML = `<div class="strength-track"><div class="strength-fill" style="width:${lv.w};background:${lv.c}"></div></div><span class="strength-label" style="color:${lv.c}">${lv.l}</span>`;
    }

    function showErr(id, msg) {
      const el = document.getElementById(id);
      const span = el.querySelector('span');
      if (span) span.textContent = msg;
      else el.textContent = msg;
      el.style.display = 'flex';
      setTimeout(() => el.style.display = 'none', 8000);
    }

    function checkRL(key) {
      if (!loginAttempts[key]) loginAttempts[key] = { c: 0, t: 0 };
      const now = Date.now();
      if (now - loginAttempts[key].t > 900000) loginAttempts[key] = { c: 0, t: now };
      if (loginAttempts[key].c >= 5) {
        const rem = Math.ceil((loginAttempts[key].t + 900000 - now) / 60000);
        return { blocked: true, remaining: rem };
      }
      return { blocked: false };
    }

    function failRL(key) {
      if (!loginAttempts[key]) loginAttempts[key] = { c: 0, t: 0 };
      loginAttempts[key].c++;
      loginAttempts[key].t = Date.now();
    }

    function clearRL(key) {
      loginAttempts[key] = { c: 0, t: 0 };
    }

    async function studentLogin(e) {
      e.preventDefault();
      const rl = checkRL('s');
      if (rl.blocked) { showErr('s-err', `Too many attempts. Wait ${rl.remaining} min.`); return; }
      const btn = document.getElementById('s-btn');
      btn.textContent = 'Signing in...'; btn.disabled = true;
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier: document.getElementById('s-email').value, password: document.getElementById('s-pass').value, loginType: 'student' })
        });
        const d = await r.json();
        if (!r.ok) { failRL('s'); throw new Error(d.error); }
        clearRL('s');
        localStorage.setItem('user', JSON.stringify(d.user));
        localStorage.setItem('token', d.token);
        window.location.href = '/dashboard';
      } catch (err) { showErr('s-err', err.message); }
      finally { btn.innerHTML = '<i data-lucide="log-in"></i>Sign In'; btn.disabled = false; lucide.createIcons(); }
    }

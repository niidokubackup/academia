<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia - Login</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
      padding: 20px;
    }

    .bg-shapes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .bg-shapes div {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,0,0,0.03);
    }
    .bg-shapes .s1 { width: 500px; height: 500px; top: -150px; right: -150px; }
    .bg-shapes .s2 { width: 350px; height: 350px; bottom: -100px; left: -100px; }
    .bg-shapes .s3 { width: 250px; height: 250px; top: 50%; left: 55%; }

    .login-wrapper {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 24px;
    }
    .brand-logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 10px;
    }
    .brand-logos img {
      height: 50px;
      width: auto;
      object-fit: contain;
      transition: transform 0.3s;
    }
    .brand-logos img:hover { transform: scale(1.05); }
    .brand p {
      font-size: 0.82rem;
      color: #666;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* Water Glass Card */
    .login-card {
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.6);
      overflow: hidden;
    }

    /* Flip Toggle */
    .flip-toggle {
      display: flex;
      position: relative;
      background: rgba(240,240,240,0.5);
      backdrop-filter: blur(10px);
      margin: 0;
      padding: 0;
    }
    .flip-toggle-bg {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: var(--primary);
      border-radius: 10px;
      transition: transform 0.4s cubic-bezier(0.68, -0.15, 0.27, 1.15);
      box-shadow: 0 2px 8px rgba(7, 28, 255, 0.4);
      z-index: 0;
    }
    .flip-toggle-bg.staff-active {
      transform: translateX(100%);
    }
    .flip-btn {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
      transition: color 0.3s;
      color: #999;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .flip-btn.active { color: white; }
    .flip-btn svg { width: 16px; height: 16px; }

    /* Card body */
    .card-body {
      position: relative;
      overflow: hidden;
    }
    .form-panel {
      padding: 26px 28px 22px;
      transition: opacity 0.3s, transform 0.4s;
    }
    .form-panel.flip-out-up { opacity: 0; transform: translateY(-20px); }
    .form-panel.flip-out-down { opacity: 0; transform: translateY(20px); }
    .form-panel.flip-in { opacity: 1; transform: translateY(0); }

    .portal-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }
    .portal-badge svg { width: 14px; height: 14px; }
    .portal-badge.student { background: rgba(26,35,126,0.08); color: #1a237e; }
    .portal-badge.staff { background: rgba(80,129,235,0.08); color: #5081eb; }

    .form-panel h3 {
      font-size: 1.1rem;
      color: #1a237e;
      margin-bottom: 16px;
    }

    .input-group { margin-bottom: 14px; }
    .input-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #666;
      margin-bottom: 4px;
    }
    .input-wrap { position: relative; }
    .input-wrap input,
    .input-wrap select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 10px;
      font-size: 0.9rem;
      transition: border-color 0.3s, box-shadow 0.3s;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(8px);
      color: #333;
    }
    .input-wrap input:focus,
    .input-wrap select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(26,35,126,0.08);
    }
    .input-wrap input::placeholder { color: #bbb; }
    .input-wrap .eye-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      opacity: 0.35;
      transition: opacity 0.2s;
    }
    .input-wrap .eye-toggle:hover { opacity: 0.8; }
    .input-wrap .eye-toggle svg { width: 18px; height: 18px; color: #555; }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 4px;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .submit-btn svg { width: 18px; height: 18px; }
    .submit-btn.student-btn {
      background: linear-gradient(135deg, #1a237e, #3949ab);
      color: white;
    }
    .submit-btn.staff-btn {
      background: linear-gradient(135deg, #5081eb, #02b7ff);
      color: white;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .switch-mode {
      text-align: center;
      margin-top: 14px;
      font-size: 0.82rem;
      color: #999;
    }
    .switch-mode a {
      color: var(--primary);
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .switch-mode a:hover { text-decoration: underline; }

    .error-box {
      background: #ffebee;
      color: #c62828;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 12px;
      font-size: 0.82rem;
      display: none;
      align-items: center;
      gap: 6px;
    }
    .error-box svg { width: 16px; height: 16px; flex-shrink: 0; }

    .password-strength {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
    }
    .strength-track {
      flex: 1;
      height: 4px;
      background: rgba(0,0,0,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-size: 0.7rem;
      font-weight: 700;
      min-width: 75px;
    }

    .card-footer {
      text-align: center;
      padding: 10px;
      border-top: 1px solid rgba(255,255,255,0.4);
      font-size: 0.7rem;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      backdrop-filter: blur(10px);
    }
    .card-footer svg { width: 13px; height: 13px; }

    /* Responsive */
    @media (max-width: 480px) {
      .login-wrapper { max-width: 100%; }
      .form-panel { padding: 22px 20px 18px; }
      .brand-logos img { height: 40px; }
      .brand p { font-size: 0.75rem; }
      .flip-btn { font-size: 0.8rem; padding: 11px 0; }
    }
    @media (min-width: 481px) and (max-width: 768px) {
      .login-wrapper { max-width: 400px; }
    }
    @media (min-width: 1200px) {
      .login-wrapper { max-width: 440px; }
    }
  </style>
</head>
<body>
  <div class="bg-shapes">
    <div class="s1"></div>
    <div class="s2"></div>
    <div class="s3"></div>
  </div>

  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-logos">
        <img src="/images/logos/logo1.png" alt="Logo">
        <img src="/images/logos/logo2.png" alt="Academia">
      </div>
      <p>Student Information Management System</p>
    </div>

    <div class="login-card">
      <div class="flip-toggle" id="flip-toggle">
        <div class="flip-toggle-bg" id="toggle-bg"></div>
        <div class="flip-btn active" id="btn-student" onclick="flipTo('student')">
          <i data-lucide="graduation-cap"></i>
          Student
        </div>
        <div class="flip-btn" id="btn-staff" onclick="flipTo('staff')">
          <i data-lucide="briefcase"></i>
          Staff
        </div>
      </div>

      <div class="card-body" id="card-body">

        <!-- STUDENT LOGIN -->
        <div class="form-panel flip-in" id="panel-student-login">
          <div class="portal-badge student"><i data-lucide="lock"></i> Student Portal</div>
          <div class="error-box" id="s-err"><i data-lucide="alert-circle"></i><span></span></div>
          <form onsubmit="studentLogin(event)">
            <div class="input-group">
              <label>Email / Index Number</label>
              <div class="input-wrap">
                <input type="text" id="s-email" placeholder="you@email.com or matric no." required autocomplete="username">
              </div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrap">
                <input type="password" id="s-pass" placeholder="Enter password" required autocomplete="current-password">
                <button type="button" class="eye-toggle" onclick="showHide('s-pass')"><i data-lucide="eye"></i></button>
              </div>
            </div>
            <button type="submit" class="submit-btn student-btn" id="s-btn"><i data-lucide="log-in"></i> Log In</button>
          </form>
          <div class="switch-mode">New student? <a onclick="flipForm('student-register')">Create Account</a></div>
        </div>

        <!-- STUDENT REGISTER -->
        <div class="form-panel" id="panel-student-register" style="display:none">
          <div class="portal-badge student"><i data-lucide="graduation-cap"></i> Student Registration</div>
          <div class="error-box" id="sr-err"><i data-lucide="alert-circle"></i><span></span></div>
          <form onsubmit="studentRegister(event)">
            <div class="input-group">
              <label>Full Name</label>
              <div class="input-wrap"><input type="text" id="sr-name" placeholder="John Doe" required></div>
            </div>
            <div class="input-group">
              <label>Email</label>
              <div class="input-wrap"><input type="email" id="sr-email" placeholder="you@email.com" required></div>
            </div>
            <div class="input-group">
              <label>Index Number</label>
              <div class="input-wrap"><input type="text" id="sr-matric" placeholder="e.g. 20240001" required></div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrap">
                <input type="password" id="sr-pass" placeholder="Min 6 characters" required minlength="6" oninput="strength(this.value,'sr-str')">
                <button type="button" class="eye-toggle" onclick="showHide('sr-pass')"><i data-lucide="eye"></i></button>
              </div>
              <div class="password-strength" id="sr-str"></div>
            </div>
            <div class="input-row">
              <div class="input-group">
                <label>School</label>
                <div class="input-wrap">
                  <select id="sr-school" required>
                    <option value="">Select</option>
                    <option>University for Development Studies</option>
                    <option>University of Education, Winneba</option>
                    <option>Ghana Institute of Management and Public Administration</option>
                    <option>University of Mines and Technology</option>
                    <option>University of Health and Allied Sciences</option>
                    <option>University of Energy and Natural Resources</option>
                  </select>
                </div>
              </div>
              <div class="input-group">
                <label>Level</label>
                <div class="input-wrap">
                  <select id="sr-level">
                    <option value="L100">100</option><option value="L200">200</option>
                    <option value="L300">300</option><option value="L400">400</option>
                  </select>
                </div>
              </div>
            </div>
            <div class="input-group">
              <label>Department</label>
              <div class="input-wrap"><input type="text" id="sr-dept" placeholder="e.g. Computer Science"></div>
            </div>
            <button type="submit" class="submit-btn student-btn" id="sr-btn"><i data-lucide="user-plus"></i> Create Account</button>
          </form>
          <div class="switch-mode">Already have an account? <a onclick="flipForm('student-login')">Log In</a></div>
        </div>

        <!-- STAFF LOGIN -->
        <div class="form-panel" id="panel-staff-login" style="display:none">
          <div class="portal-badge staff"><i data-lucide="lock"></i> Staff Portal</div>
          <div class="error-box" id="st-err"><i data-lucide="alert-circle"></i><span></span></div>
          <form onsubmit="staffLogin(event)">
            <div class="input-group">
              <label>Email Address</label>
              <div class="input-wrap">
                <input type="email" id="st-email" placeholder="you@email.com" required autocomplete="username">
              </div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrap">
                <input type="password" id="st-pass" placeholder="Enter password" required autocomplete="current-password">
                <button type="button" class="eye-toggle" onclick="showHide('st-pass')"><i data-lucide="eye"></i></button>
              </div>
            </div>
            <button type="submit" class="submit-btn staff-btn" id="st-btn"><i data-lucide="log-in"></i> Log In</button>
          </form>
          <div class="switch-mode">New staff? <a onclick="flipForm('staff-register')">Create Account</a></div>
        </div>

        <!-- STAFF REGISTER -->
        <div class="form-panel" id="panel-staff-register" style="display:none">
          <div class="portal-badge staff"><i data-lucide="briefcase"></i> Staff Registration</div>
          <div class="error-box" id="str-err"><i data-lucide="alert-circle"></i><span></span></div>
          <form onsubmit="staffRegister(event)">
            <div class="input-group">
              <label>Full Name</label>
              <div class="input-wrap"><input type="text" id="str-name" placeholder="Dr. John Smith" required></div>
            </div>
            <div class="input-group">
              <label>Email</label>
              <div class="input-wrap"><input type="email" id="str-email" placeholder="you@email.com" required></div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrap">
                <input type="password" id="str-pass" placeholder="Min 6 characters" required minlength="6" oninput="strength(this.value,'str-str')">
                <button type="button" class="eye-toggle" onclick="showHide('str-pass')"><i data-lucide="eye"></i></button>
              </div>
              <div class="password-strength" id="str-str"></div>
            </div>
            <div class="input-group">
              <label>Role</label>
              <div class="input-wrap">
                <select id="str-role">
                  <option value="lecturer">Lecturer</option>
                  <option value="admin">Administrator</option>
                </select>
              </div>
            </div>
            <div class="input-group">
              <label>School</label>
              <div class="input-wrap">
                <select id="str-school" required>
                  <option value="">Select</option>
                  <option>University for Development Studies</option>
                  <option>University of Education, Winneba</option>
                  <option>Ghana Institute of Management and Public Administration</option>
                  <option>University of Mines and Technology</option>
                  <option>University of Health and Allied Sciences</option>
                  <option>University of Energy and Natural Resources</option>
                </select>
              </div>
            </div>
            <div class="input-group">
              <label>Department</label>
              <div class="input-wrap"><input type="text" id="str-dept" placeholder="e.g. Computer Science"></div>
            </div>
            <button type="submit" class="submit-btn staff-btn" id="str-btn"><i data-lucide="user-plus"></i> Create Account</button>
          </form>
          <div class="switch-mode">Already have an account? <a onclick="flipForm('staff-login')">Log In</a></div>
        </div>

      </div>

      <div class="card-footer"><i data-lucide="shield-check"></i> 256-bit encrypted &middot; Secure connection</div>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();

    const user = localStorage.getItem('user');
    if (user) window.location.href = '/dashboard';

    let currentRole = 'student';
    let currentPanel = 'student-login';
    let animating = false;
    let loginAttempts = {};

    function flipTo(role) {
      if (role === currentRole || animating) return;
      animating = true;

      const bg = document.getElementById('toggle-bg');
      const oldPanel = document.getElementById('panel-' + currentPanel);
      const isGoingDown = (role === 'staff');

      bg.classList.toggle('staff-active', role === 'staff');
      document.getElementById('btn-student').classList.toggle('active', role === 'student');
      document.getElementById('btn-staff').classList.toggle('active', role === 'staff');

      oldPanel.classList.add(isGoingDown ? 'flip-out-up' : 'flip-out-down');

      setTimeout(() => {
        oldPanel.style.display = 'none';
        oldPanel.classList.remove('flip-out-up', 'flip-out-down');

        const newPanelName = role + '-login';
        const newPanel = document.getElementById('panel-' + newPanelName);
        newPanel.style.display = 'block';
        newPanel.classList.remove('flip-in');
        newPanel.classList.add(isGoingDown ? 'flip-out-down' : 'flip-out-up');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            newPanel.classList.remove('flip-out-down', 'flip-out-up');
            newPanel.classList.add('flip-in');
          });
        });

        currentRole = role;
        currentPanel = newPanelName;
        animating = false;
        if (window.lucide) lucide.createIcons();
      }, 250);
    }

    function flipForm(panelName) {
      if (animating) return;
      animating = true;

      const oldPanel = document.getElementById('panel-' + currentPanel);
      const newPanel = document.getElementById('panel-' + panelName);
      const isGoingDown = panelName.includes('register');

      oldPanel.classList.add(isGoingDown ? 'flip-out-up' : 'flip-out-down');

      setTimeout(() => {
        oldPanel.style.display = 'none';
        oldPanel.classList.remove('flip-out-up', 'flip-out-down');

        newPanel.style.display = 'block';
        newPanel.classList.remove('flip-in');
        newPanel.classList.add(isGoingDown ? 'flip-out-down' : 'flip-out-up');

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            newPanel.classList.remove('flip-out-down', 'flip-out-up');
            newPanel.classList.add('flip-in');
          });
        });

        currentPanel = panelName;
        animating = false;
        if (window.lucide) lucide.createIcons();
      }, 250);
    }

    function showHide(id) {
      const el = document.getElementById(id);
      const btn = el.parentElement.querySelector('.eye-toggle');
      if (el.type === 'password') {
        el.type = 'text';
        btn.innerHTML = '<i data-lucide="eye-off"></i>';
      } else {
        el.type = 'password';
        btn.innerHTML = '<i data-lucide="eye"></i>';
      }
      if (window.lucide) lucide.createIcons();
    }

    function strength(val, id) {
      const el = document.getElementById(id);
      if (!val) { el.innerHTML = ''; return; }
      let s = 0;
      if (val.length >= 6) s++;
      if (val.length >= 10) s++;
      if (/[A-Z]/.test(val)) s++;
      if (/[0-9]/.test(val)) s++;
      if (/[^A-Za-z0-9]/.test(val)) s++;
      const levels = [
        { l: 'Very Weak', c: '#c62828', w: '20%' },
        { l: 'Weak', c: '#e65100', w: '40%' },
        { l: 'Fair', c: '#f57f17', w: '60%' },
        { l: 'Strong', c: '#2e7d32', w: '80%' },
        { l: 'Very Strong', c: '#1b5e20', w: '100%' }
      ];
      const lv = levels[Math.min(s, 4)];
      el.innerHTML = `<div class="strength-track"><div class="strength-fill" style="width:${lv.w};background:${lv.c}"></div></div><span class="strength-label" style="color:${lv.c}">${lv.l}</span>`;
    }

    function showErr(id, msg) {
      const el = document.getElementById(id);
      const span = el.querySelector('span');
      if (span) span.textContent = msg;
      else el.textContent = msg;
      el.style.display = 'flex';
      setTimeout(() => el.style.display = 'none', 8000);
    }

    function checkRL(key) {
      if (!loginAttempts[key]) loginAttempts[key] = { c: 0, t: 0 };
      const now = Date.now();
      if (now - loginAttempts[key].t > 900000) loginAttempts[key] = { c: 0, t: now };
      if (loginAttempts[key].c >= 5) {
        const rem = Math.ceil((loginAttempts[key].t + 900000 - now) / 60000);
        return { blocked: true, remaining: rem };
      }
      return { blocked: false };
    }

    function failRL(key) {
      if (!loginAttempts[key]) loginAttempts[key] = { c: 0, t: 0 };
      loginAttempts[key].c++;
      loginAttempts[key].t = Date.now();
    }

    function clearRL(key) {
      loginAttempts[key] = { c: 0, t: 0 };
    }

    async function studentLogin(e) {
      e.preventDefault();
      const rl = checkRL('s');
      if (rl.blocked) { showErr('s-err', `Too many attempts. Wait ${rl.remaining} min.`); return; }
      const btn = document.getElementById('s-btn');
      btn.textContent = 'Signing in...'; btn.disabled = true;
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier: document.getElementById('s-email').value, password: document.getElementById('s-pass').value, loginType: 'student' })
        });
        const d = await r.json();
        if (!r.ok) { failRL('s'); throw new Error(d.error); }
        clearRL('s');
        localStorage.setItem('user', JSON.stringify(d.user));
        localStorage.setItem('token', d.token);
        window.location.href = '/dashboard';
      } catch (err) { showErr('s-err', err.message); }
      finally { btn.innerHTML = '<i data-lucide="log-in"></i> Log In'; btn.disabled = false; if (window.lucide) lucide.createIcons(); }
    }

    async function staffLogin(e) {
      e.preventDefault();
      const rl = checkRL('st');
      if (rl.blocked) { showErr('st-err', `Too many attempts. Wait ${rl.remaining} min.`); return; }
      const btn = document.getElementById('st-btn');
      btn.textContent = 'Signing in...'; btn.disabled = true;
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier: document.getElementById('st-email').value, password: document.getElementById('st-pass').value, loginType: 'staff' })
        });
        const d = await r.json();
        if (!r.ok) { failRL('st'); throw new Error(d.error); }
        clearRL('st');
        localStorage.setItem('user', JSON.stringify(d.user));
        localStorage.setItem('token', d.token);
        window.location.href = '/dashboard';
      } catch (err) { showErr('st-err', err.message); }
      finally { btn.innerHTML = '<i data-lucide="log-in"></i> Log In'; btn.disabled = false; if (window.lucide) lucide.createIcons(); }
    }

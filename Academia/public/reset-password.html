<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academia - Reset Password</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d1642 0%, #1a237e 50%, #3949ab 100%);
      padding: 20px;
    }

    .reset-shell {
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,0.96);
      border-radius: 18px;
      box-shadow: 0 18px 55px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .reset-head {
      background: var(--primary);
      color: white;
      padding: 24px;
      text-align: center;
    }

    .reset-body {
      padding: 24px;
    }

    .reset-body .field { margin-bottom: 16px; }
    .reset-body label { display: block; margin-bottom: 6px; font-weight: 700; }
    .reset-body input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; }
    .reset-body .action { width: 100%; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="reset-shell">
    <div class="reset-head">
      <div style="font-size:2rem;font-weight:900;letter-spacing:2px">ACADEMIA</div>
      <div style="opacity:0.85;margin-top:4px">Reset your password</div>
    </div>
    <div class="reset-body">
      <div id="reset-message" class="success-msg" style="display:none"></div>
      <div id="reset-error" class="error-msg" style="display:none"></div>
      <form id="reset-form">
        <div class="field">
          <label for="newPassword">New Password</label>
          <input id="newPassword" type="password" placeholder="Enter a new password" required>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" type="password" placeholder="Re-enter the password" required>
        </div>
        <button class="btn btn-primary action" type="submit">Update Password</button>
      </form>
    </div>
  </div>

  <script>
    lucide.createIcons();
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    function showMessage(type, text) {
      const box = document.getElementById(type === 'error' ? 'reset-error' : 'reset-message');
      box.textContent = text;
      box.style.display = 'block';
      if (type === 'error') {
        document.getElementById('reset-message').style.display = 'none';
      } else {
        document.getElementById('reset-error').style.display = 'none';
      }
    }

    async function validateToken() {
      if (!token) {
        showMessage('error', 'Invalid password reset link.');
        return false;
      }

      const res = await fetch(`/api/auth/validate-reset-token?token=${encodeURIComponent(token)}`);
      const data = await res.json();
      if (!res.ok) {
        showMessage('error', data.error || 'Invalid reset link.');
        return false;
      }
      return true;
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!token) {
        showMessage('error', 'Invalid reset link.');
        return;
      }

      const password = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) {
        showMessage('error', 'Passwords do not match.');
        return;
      }

      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showMessage('error', data.error || 'Unable to reset password.');
        return;
      }

      showMessage('success', data.message || 'Password reset successful.');
      document.getElementById('reset-form').reset();
      setTimeout(() => window.location.href = '/', 2500);
    });

    validateToken();
  </script>
</body>
</html>
